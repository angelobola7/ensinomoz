  position: relative;
  z-index: 1;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(255, 215, 0, 0.5);

<body class="locked">

<div id="authOverlay">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-logo">EnsinoMoz</div>
      <div class="auth-sub">Plataforma de Ensino Secundário · Moçambique</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="authTab('login')">Entrar</button>
      <button class="auth-tab" onclick="authTab('register')">Criar Conta</button>
    </div>
    <div class="auth-body">
      <div class="auth-panel on" id="apLogin">
        <div class="auth-field"><label>Email</label><input type="email" id="liEmail" placeholder="o.seu@email.com"></div>
        <div class="auth-field"><label>Senha</label><input type="password" id="liPass" placeholder="••••••••"></div>
        <button class="auth-btn" onclick="doLogin()">→ Entrar na Plataforma</button>
        <div class="auth-msg" id="liMsg"></div>
      </div>
      <div class="auth-panel" id="apRegister">
        <div class="auth-field"><label>Nome completo</label><input type="text" id="rgNome" placeholder="Ex: Ana Machava"></div>
        <div class="auth-field"><label>Email</label><input type="email" id="rgEmail" placeholder="email@exemplo.com"></div>
        <div class="auth-field"><label>Senha</label><input type="password" id="rgPass" placeholder="mín. 6 caracteres"></div>
        <div class="auth-field"><label>Confirmar Senha</label><input type="password" id="rgPass2" placeholder="repetir senha"></div>
        <div class="auth-field"><label>Profissão</label><select id="rgProf"><option>Estudante</option><option>Professor(a)</option><option>Encarregado de Educação</option><option>Outro</option></select></div>
        <div class="auth-field"><label>Contacto</label><input type="tel" id="rgTel" placeholder="+258 84 000 0000"></div>
        <button class="auth-btn" onclick="doRegister()">✓ Criar Conta Gratuita</button>
        <div class="auth-msg" id="rgMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
// Funções básicas para o overlay funcionar
function authTab(tab) {
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('on'));
  document.getElementById(tab === 'login' ? 'apLogin' : 'apRegister').classList.add('on');
  document.querySelectorAll('.auth-tab').forEach((btn, i) => {
    btn.classList.toggle('on', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
}

function doLogin() {
  const email = document.getElementById('liEmail').value;
  const pass = document.getElementById('liPass').value;
  const msg = document.getElementById('liMsg');
  if (!email || !pass) {
    msg.textContent = '⚠️ Preencha todos os campos';
    msg.className = 'auth-msg err';
    return;
  }
  // Login simplificado para teste
  localStorage.setItem('ensinomoz_session', JSON.stringify({ nome: 'Usuário', email: email }));
  document.getElementById('authOverlay').style.display = 'none';
  document.body.classList.remove('locked');
}

function doRegister() {
  const nome = document.getElementById('rgNome').value;
  const email = document.getElementById('rgEmail').value;
  const pass = document.getElementById('rgPass').value;
  const pass2 = document.getElementById('rgPass2').value;
  const msg = document.getElementById('rgMsg');
  if (!nome || !email || !pass || pass !== pass2) {
    msg.textContent = '⚠️ Verifique os campos';
    msg.className = 'auth-msg err';
    return;
  }
  localStorage.setItem('ensinomoz_session', JSON.stringify({ nome: nome, email: email }));
  document.getElementById('authOverlay').style.display = 'none';
  document.body.classList.remove('locked');
}
</script>

<div class="page">
  <h1 style="text-align:center;margin-top:50px">EnsinoMoz - Plataforma de Ensino Secundário</h1>
  <p style="text-align:center;margin-top:20px">Sistema carregado com sucesso!</p>
</div>

</body>
